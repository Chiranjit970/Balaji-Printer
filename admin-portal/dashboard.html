<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Balaji Printers</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/design-system.css">
  <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>

  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        <span class="text-h2">Balaji Printers</span>
      </div>
      
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
          <span class="text-body-semibold">Dashboard</span>
        </a>
        <a href="#" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
          <span class="text-body-semibold">Orders</span>
        </a>
        <a href="#" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
          <span class="text-body-semibold">Products</span>
        </a>
        <a href="#" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          <span class="text-body-semibold">Customers</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="top-bar">
        <div class="user-profile">
          <span id="admin-name" class="text-body-semibold">Admin</span>
          <button id="logout-btn" class="admin-button" style="width: auto; height: 36px; padding: 0 16px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Logout
          </button>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <h1 class="text-display">Dashboard Overview</h1>
          <p class="text-body text-muted">Welcome to your Balaji Printers control center.</p>
        </div>

        <div class="metrics-grid">
          <div class="metric-card">
            <h3 class="metric-title text-caption-semibold">TOTAL ORDERS</h3>
            <div class="metric-value text-display">1,245</div>
            <p class="text-success text-caption">↑ 12% from last month</p>
          </div>
          <div class="metric-card">
            <h3 class="metric-title text-caption-semibold">TOTAL REVENUE</h3>
            <div class="metric-value text-display">₹2,45,890</div>
            <p class="text-success text-caption">↑ 8% from last month</p>
          </div>
          <div class="metric-card">
            <h3 class="metric-title text-caption-semibold">TOTAL PRODUCTS</h3>
            <div class="metric-value text-display">320</div>
            <p class="text-muted text-caption">In 12 categories</p>
          </div>
          <div class="metric-card">
            <h3 class="metric-title text-caption-semibold">ACTIVE USERS</h3>
            <div class="metric-value text-display">842</div>
            <p class="text-success text-caption">↑ 24 new this week</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { AdminSession } from './js/utils/api.js';

    document.addEventListener('DOMContentLoaded', () => {
      AdminSession.init();

      if (!AdminSession.isAuthenticated()) {
        window.location.href = '/admin-portal/index.html';
        return;
      }

      const admin = AdminSession.getAdmin();
      if (admin && admin.name) {
        document.getElementById('admin-name').textContent = admin.name;
      }

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await AdminSession.logout();
      });
    });
  </script>
</body>
</html>
